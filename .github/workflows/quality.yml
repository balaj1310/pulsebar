name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  quality:
    name: Check formatting, build, and test
    runs-on: macos-15
    timeout-minutes: 20
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Show runner and Swift toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version
          swift format --version

      - name: Validate package manifest
        run: swift package describe --type json > /dev/null

      - name: Run quality gates
        run: make check
